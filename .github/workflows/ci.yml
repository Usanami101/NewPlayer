name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify core modules load
        shell: bash
        run: |
          node -e "require('./src/settings/catalog'); require('./src/main/m3u'); require('./src/data/radio-filters'); require('./src/data/iptv-sources'); console.log('ok')"
